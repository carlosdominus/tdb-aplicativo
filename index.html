
<!DOCTYPE html>

    <title>Protocolo Força Natural</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #E63946;
        --primary-dark: #8B0000;
        --bg-light: #F8F9FA;
        --text-main: #121212;
      }
      html, body {
        overflow-x: hidden;
        width: 100%;
        margin: 0;
        padding: 0;
        -webkit-overflow-scrolling: touch;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-light);
        color: var(--text-main);
        -webkit-font-smoothing: antialiased;
      }
      h1, h2, h3, .font-poppins {
        font-family: 'Poppins', sans-serif;
      }
      .glass {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.4);
      }
      .glass-dark {
        background: rgba(18, 18, 18, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .gradient-primary {
        background: linear-gradient(135deg, #FF1F1F 0%, #8B0000 100%);
      }
      .ease-apple {
        transition-timing-function: cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
        100% { transform: translateY(0px); }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }
      input, select, textarea {
        font-size: 16px !important;
      }
    </style>
